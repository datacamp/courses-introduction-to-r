id: 58
title: Introduzione a R
programming_language: r
description: >-
  In questo corso di introduzione a R, imparerai a conoscere le basi di questo
  linguaggio open source ampiamente utilizzato, tra cui vettori, fattori, liste
  e data frame. Grazie alle competenze di codifica che acquisirai in questo
  corso, sarai pronto a intraprendere la tua analisi dei dati in R. Ci sono
  milioni di utenti di R in tutto il mondo, il che lo rende un linguaggio di
  programmazione leader nella statistica e nella scienza dei dati. Inizia il tuo
  viaggio nel coding in uno dei corsi più popolari di DataCamp oggi stesso!
